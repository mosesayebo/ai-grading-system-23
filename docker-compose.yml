version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_grading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/ai_grading
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
    command: sh -c "yarn prisma:generate && yarn prisma:migrate && yarn prisma:seed && yarn dev"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE: http://backend:4000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "yarn dev --host"

volumes:
  db_data:
